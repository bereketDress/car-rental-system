name: Build and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build backend
        run: mvn -B package --file backend/pom.xml

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker images
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/sweproject-backend:latest ./backend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/sweproject-frontend:latest ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/sweproject-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/sweproject-frontend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/sweproject
            sudo docker-compose pull
            sudo docker-compose up -d
