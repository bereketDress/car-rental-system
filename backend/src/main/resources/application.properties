server.port=8081
spring.profiles.default=local

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sweprojectdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:1234}}

spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:seed.sql
spring.sql.init.continue-on-error=true

# JWT
jwt.secret=${JWT_SECRET:v8y/B?E(H+MbQeThWmZq4t7w!z%C&F)J}
jwt.expiration=86400000

# Stripe
stripe.secret.key=${STRIPE_SECRET_KEY:sk_test_ReplaceMeWithYourStripeSecretKey}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY:pk_test_ReplaceMeWithYourStripePublishableKey}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_ReplaceMeWithYourWebhookSecret}

# Logging
logging.level.root=warn
logging.level.com.crms=DEBUG
spring.main.banner-mode=off