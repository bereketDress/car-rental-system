services:
  postgres:
    image: postgres:16
    container_name: crms_postgres
    environment:
      POSTGRES_DB: SWEProjectDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: fekadie/sweproject-backend:latest
    container_name: crms_backend
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/SWEProjectDB
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1234
      DB_PASSWORD: 1234
    depends_on:
      - postgres

  frontend:
    image: fekadie/sweproject-frontend:latest
    container_name: crms_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data: